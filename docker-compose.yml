services:
  postgres:
    image: postgres:16-alpine
    container_name: sistem-ujian-postgres
    environment:
      POSTGRES_DB: sistem_ujian
      POSTGRES_PASSWORD: sistem_ujian
      POSTGRES_USER: sistem_ujian
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
